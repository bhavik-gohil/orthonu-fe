name: Auto PR dev → master

on:
  push:
    branches:
      - dev

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR
        run: |
          gh pr create \
            --base master \
            --head dev \
            --title "Auto PR: dev → master" \
            --body "Auto-created PR from dev to master"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}